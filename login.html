<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgendaSys — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0f1a;
      --panel:     #111827;
      --border:    #1e2d40;
      --accent:    #00d4aa;
      --accent2:   #0077ff;
      --text:      #e8edf5;
      --muted:     #6b7a99;
      --error:     #ff4d6d;
      --radius:    14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Fundo animado */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,212,170,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,170,.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .blob {
      position: fixed; border-radius: 50%; filter: blur(90px); z-index: 0; pointer-events: none;
    }
    .blob-1 { width: 420px; height: 420px; background: rgba(0,212,170,.12); top: -100px; right: -80px; animation: drift 10s ease-in-out infinite alternate; }
    .blob-2 { width: 320px; height: 320px; background: rgba(0,119,255,.10); bottom: -60px; left: -60px; animation: drift 14s ease-in-out infinite alternate-reverse; }

    @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px, 20px) scale(1.08); } }

    /* Card */
    .card {
      position: relative; z-index: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 52px 48px;
      width: 100%; max-width: 440px;
      box-shadow: 0 32px 80px rgba(0,0,0,.5);
      animation: slideUp .55s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes slideUp { from { opacity:0; transform: translateY(32px); } to { opacity:1; transform: translateY(0); } }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.9rem;
      letter-spacing: -1px;
      margin-bottom: 4px;
    }
    .logo span { color: var(--accent); }

    .subtitle {
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 40px;
    }

    label {
      display: block;
      font-size: .78rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field { margin-bottom: 22px; position: relative; }

    input {
      width: 100%;
      background: #0d1422;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .97rem;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,170,.12);
    }

    input::placeholder { color: #3a4a6a; }

    .btn {
      width: 100%;
      padding: 15px;
      margin-top: 8px;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: .04em;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      position: relative;
      overflow: hidden;
    }

    .btn:hover { opacity: .9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .btn-loading::after {
      content: '';
      position: absolute; inset: 0;
      background: inherit;
      display: flex; align-items: center; justify-content: center;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: .88rem;
      margin-bottom: 20px;
      display: none;
    }

    .alert.error  { background: rgba(255,77,109,.12); border: 1px solid rgba(255,77,109,.3); color: #ff8099; display: block; }
    .alert.success { background: rgba(0,212,170,.1); border: 1px solid rgba(0,212,170,.3); color: var(--accent); display: block; }

    .hint {
      text-align: center;
      margin-top: 28px;
      font-size: .82rem;
      color: var(--muted);
    }

    .hint strong { color: var(--accent); font-weight: 500; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <div class="logo">Agenda<span>Sys</span></div>
    <p class="subtitle">Sistema de Agendamento de Recursos</p>

    <div id="alerta" class="alert"></div>

    <div class="field">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email"/>
    </div>

    <div class="field">
      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn" id="btnLogin" onclick="fazerLogin()">Entrar</button>

    <hr class="divider"/>

    <div class="hint">
      Acesso de teste:<br/>
      Admin — <strong>admin@email.com</strong> / <strong>password</strong><br/>
      Usuário — <strong>joao@email.com</strong> / <strong>password</strong>
    </div>
  </div>

  <script>
    // Permite login com Enter
    document.getElementById('senha').addEventListener('keydown', e => {
      if (e.key === 'Enter') fazerLogin();
    });

    async function fazerLogin() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const btn   = document.getElementById('btnLogin');
      const alerta = document.getElementById('alerta');

      alerta.className = 'alert';
      alerta.textContent = '';

      if (!email || !senha) {
        mostrarAlerta('Preencha o e-mail e a senha.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Entrando...';

      try {
        const res = await fetch('api/login.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });

        const data = await res.json();

        if (res.ok && data.sucesso) {
          mostrarAlerta('Login realizado! Redirecionando...', 'success');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
        } else {
          mostrarAlerta(data.erro || 'Erro ao fazer login.', 'error');
          btn.disabled = false;
          btn.textContent = 'Entrar';
        }
      } catch (err) {
        mostrarAlerta('Erro de conexão. Verifique o servidor.', 'error');
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }

    function mostrarAlerta(msg, tipo) {
      const alerta = document.getElementById('alerta');
      alerta.textContent = msg;
      alerta.className = 'alert ' + tipo;
    }
  </script>
</body>
</html>
